name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      run: sudo docker build -t xray-app .

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v0.1.8
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |

          echo "🚀 Start deployment..."

          # 1. Install Docker if not exists
          if ! command -v docker &> /dev/null
          then
              echo "🐳 Installing Docker..."
              sudo apt update -y
              sudo apt install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
          else
              echo "✅ Docker already installed"
          fi

          # 2. Go to project folder or clone if not exists
          if [ ! -d "/home/ubuntu/X-ray_CI_CD" ]; then
              echo "📦 Cloning repo..."
              git clone https://github.com/AlbertZaqaryan/X-ray_CI_CD.git /home/ubuntu/X-ray_CI_CD
          fi

          cd /home/ubuntu/X-ray_CI_CD

          # 3. Pull latest changes
          echo "⬇️ Pull latest code..."
          git pull origin main

          # 4. Stop and remove old container
          echo "🧹 Cleaning old containers..."
          sudo docker stop xray-container || true
          sudo docker rm xray-container || true

          # 5. Build new image
          echo "🔨 Building Docker image..."
          sudo docker build -t xray-app .

          # 6. Run new container
          echo "🚀 Running container..."
          sudo docker run -d \
            --name xray-container \
            -p 8000:8000 \
            xray-app

          echo "✅ Deployment finished!"
